```html

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كبابجي - لوحة تنبيهات الوثائق</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root {
  --red: #C0392B;
  --red-light: #FADBD8;
  --orange: #D35400;
  --orange-light: #FAE5D3;
  --yellow: #D4AC0D;
  --yellow-light: #FEF9E7;
  --green: #1E8449;
  --green-light: #D5F5E3;
  --blue: #1A5276;
  --blue-light: #D6EAF8;
  --gray: #5D6D7E;
  --gray-light: #EAF0FB;
  --bg: #F4F6FA;
  --card: #fff;
  --text: #1a202c;
  --muted: #64748b;
  --border: #e2e8f0;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 60%, #0F3460 100%);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.header-inner {
  max-width: 1400px;
  margin: auto;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E74C3C, #C0392B);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.brand-text h1 {
  font-size: 22px;
  font-weight: 900;

}

.brand-text p {
  font-size: 13px;

  gap: 16px;
}

.manager-badge,

  background: rgba(255,255,255,0.1);

  border: 1px solid rgba(255,255,255,0.2);

}

.main {
  max-width: 1400px;

  padding: 28px 24px 60px;
}

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

  margin-bottom: 28px;

.kpi-card {
  background: #fff;

}

.kpi-card h2 {
  font-size: 38px;
  margin-top: 10px;
}

.kpi-card p {
  margin-top: 8px;

  font-weight: 600;
}

.red { border-color: var(--red); }
.orange { border-color: var(--orange); }
.yellow { border-color: var(--yellow); }

.blue { border-color: var(--blue); }

table {

}

  background: var(--bg);

td {

}

.status-pill {
  padding: 5px 12px;

}

.status-pill.expired {
  background: var(--red-light);
  color: var(--red);
}

.status-pill.critical {
  background: var(--orange-light);
  color: var(--orange);
}

.status-pill.soon {
  background: var(--yellow-light);
  color: var(--yellow);

  background: var(--green-light);

.branch-tag {

.chart-panel {

</style>
</head>

<body>

<div class="header">
  <div class="header-inner">

    <div class="header-brand">
      <div class="logo-circle">🍖</div>
      <div class="brand-text">
        <h1>كبابجي</h1>
        <p>لوحة تنبيهات الوثائق والإقامات</p>
      </div>
    </div>

    <div class="header-right">
      <div class="date-badge" id="currentDate"></div>
      <div class="manager-badge">👤 أبو شفاء</div>
      <button class="sync-btn" onclick="loadData()">🔄 تحديث</button>
    </div>

  </div>
</div>

<div class="main">

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('alerts')">🔔 التنبيهات</button>
    <button class="tab-btn" onclick="switchTab('all')">📋 جميع الوثائق</button>
  </div>

  <div id="tabContent"></div>

</div>

<script>

// =========================================
// رابط Apps Script
// =========================================

const API_URL = 'https://script.google.com/macros/s/AKfycbw8shl1fJihjabE4t8cdi1HMof9WKlis40NL2WQUkcYKNO_3TdHlNQonrslIpqow0_itg/exec';

// =========================================
// Variables
// =========================================

let allData = [];
let activeTab = 'alerts';

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

// =========================================
// Date
// =========================================

document.getElementById('currentDate').textContent =
  TODAY.toLocaleDateString('ar-SA', {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });

// =========================================
// Load Data
// =========================================

function loadData() {

  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      allData = data;

      renderKPIs();
      renderTab(activeTab);

    })
    .catch(err => {
      alert('خطأ في تحميل البيانات: ' + err.message);
    });
}

// =========================================
// Status
// =========================================

function getStatus(days) {

  if (days < 0) return 'expired';

  if (days <= 14) return 'critical';

  if (days <= 30) return 'soon';

  return 'ok';
}

function statusLabel(days) {

  if (days < 0) {
    return 'منتهية';
  }

  return days + ' يوم';
}

function docTypeLabel(type) {

  const map = {
    'اقامات': '🪪 إقامة',
    'التامين الطبي': '🏥 تأمين طبي',
    'عقود العمل': '📄 عقد عمل',
    'السجلات والرخص': '📜 سجل / رخصة'
  };

  return map[type] || type;
}

// =========================================
// KPIs
// =========================================

function renderKPIs() {

  const expired = allData.filter(r => r.days < 0).length;

  const critical = allData.filter(r => r.days >= 0 && r.days <= 14).length;

  const soon = allData.filter(r => r.days > 14 && r.days <= 30).length;

  const ok = allData.filter(r => r.days > 30).length;

  document.getElementById('kpiGrid').innerHTML = `

    <div class="kpi-card red">
      <div>🔴</div>
      <h2>${expired}</h2>
      <p>وثائق منتهية</p>
    </div>

    <div class="kpi-card orange">
      <div>🟠</div>
      <h2>${critical}</h2>
      <p>تنتهي خلال 14 يوم</p>
    </div>

    <div class="kpi-card yellow">
      <div>🟡</div>
      <h2>${soon}</h2>
      <p>تنتهي خلال شهر</p>
    </div>

    <div class="kpi-card green">
      <div>🟢</div>
      <h2>${ok}</h2>
      <p>سارية المفعول</p>
    </div>

    <div class="kpi-card blue">
      <div>📋</div>
      <h2>${allData.length}</h2>
      <p>إجمالي الوثائق</p>
    </div>

  `;
}

// =========================================
// Tabs
// =========================================

function switchTab(tab) {

  activeTab = tab;

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });

  event.target.classList.add('active');

  renderTab(tab);
}

function renderTab(tab) {

  const el = document.getElementById('tabContent');

  if (tab === 'alerts') {

    const items = allData
      .filter(r => r.days < 30)
      .sort((a,b) => a.days - b.days);

    el.innerHTML = buildTable(items, '⚡ التنبيهات العاجلة');

    renderCharts();
  }

  if (tab === 'all') {

    const items = allData
      .sort((a,b) => a.days - b.days);

    el.innerHTML = buildTable(items, '📋 جميع الوثائق');
  }
}

// =========================================
// Build Table
// =========================================

function buildTable(items, title) {

  return `

    <div class="section-title">${title}</div>

    <div class="chart-panel">
      <canvas id="statusChart" height="90"></canvas>
    </div>

    <div class="full-table">

      <div class="panel-header">
        <strong>${title}</strong>
      </div>

      <table>

        <thead>
          <tr>
            <th>#</th>
            <th>الاسم</th>
            <th>الفرع</th>
            <th>النوع</th>
            <th>تاريخ الانتهاء</th>
            <th>الحالة</th>
          </tr>
        </thead>

        <tbody>

          ${items.map((r,i) => {

            const st = getStatus(r.days);

            return `

              <tr>

                <td>${i+1}</td>

                <td>
                  <strong>${r.name}</strong>
                </td>

                <td>
                  <span class="branch-tag">${r.branch}</span>
                </td>

                <td>
                  ${docTypeLabel(r.type)}
                </td>

                <td>
                  ${r.expiry}
                </td>

                <td>
                  <span class="status-pill ${st}">
                    ${statusLabel(r.days)}
                  </span>
                </td>

              </tr>

            `;

          }).join('')}

        </tbody>

      </table>

    </div>

  `;
}

// =========================================
// Charts
// =========================================

function renderCharts() {

  const canvas = document.getElementById('statusChart');

  if (!canvas) return;

  const expired = allData.filter(r => r.days < 0).length;

  const critical = allData.filter(r => r.days >= 0 && r.days <= 14).length;

  const soon = allData.filter(r => r.days > 14 && r.days <= 30).length;

  const ok = allData.filter(r => r.days > 30).length;

  new Chart(canvas, {

    type: 'doughnut',

    data: {

      labels: [
        'منتهية',
        'عاجلة',
        'قريبة',
        'سارية'
      ],

      datasets: [{

        data: [expired, critical, soon, ok],

        backgroundColor: [
          '#C0392B',
          '#D35400',
          '#D4AC0D',
          '#1E8449'
        ]

      }]
    }
  });
}

// =========================================
// Start
// =========================================

loadData();

</script>

</body>
</html>
