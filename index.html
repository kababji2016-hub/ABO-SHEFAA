<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كبابجي - لوحة تنبيهات الوثائق والإقامات الذكية</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
  :root {
    --red: #C0392B;
    --red-light: #FADBD8;
    --orange: #D35400;
    --orange-light: #FAE5D3;
    --yellow: #D4AC0D;
    --yellow-light: #FEF9E7;
    --green: #1E8449;
    --green-light: #D5F5E3;
    --blue: #1A5276;
    --blue-light: #D6EAF8;
    --gray: #5D6D7E;
    --gray-light: #EAF0FB;
    --bg: #F4F6FA;
    --card: #fff;
    --text: #1a202c;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 4px 14px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rlt;
  }

  .header {
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 60%, #0F3460 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #E74C3C, #C0392B);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 12px rgba(231,76,60,0.35);
  }

  .brand-text h1 {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
  }

  .brand-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .date-badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
  }

  .manager-badge {
    background: linear-gradient(135deg, #E74C3C, #C0392B);
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .sync-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    font-weight: 600;
  }

  .sync-btn:hover { background: rgba(255,255,255,0.25); }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  .main { max-width: 1400px; margin: 0 auto; padding: 28px 24px 60px; }

  .error-banner {
    background: #FEF3F2;
    border: 1px solid #FCA5A5;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    display: none;
    color: #991B1B;
    font-size: 14px;
    font-weight: bold;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    border-right: 5px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
  .kpi-card.danger { border-right-color: var(--red); }
  .kpi-card.warning { border-right-color: var(--orange); }
  .kpi-card.caution { border-right-color: var(--yellow); }
  .kpi-card.good { border-right-color: var(--green); }
  .kpi-card.info { border-right-color: var(--blue); }
  .kpi-card.total { border-right-color: var(--gray); }

  .kpi-icon { font-size: 26px; margin-bottom: 8px; display: block; }
  .kpi-value { font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
  
  .kpi-card.danger .kpi-value { color: var(--red); }
  .kpi-card.warning .kpi-value { color: var(--orange); }
  .kpi-card.caution .kpi-value { color: var(--yellow); }
  .kpi-card.good .kpi-value { color: var(--green); }
  .kpi-card.info .kpi-value { color: var(--blue); }
  .kpi-card.total .kpi-value { color: var(--gray); }

  .kpi-label { font-size: 13px; color: var(--text); font-weight: 700; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .tabs {
    display: flex;
    gap: 6px;
    background: #e2e8f0;
    border-radius: 10px;
    padding: 5px;
    margin-bottom: 24px;
    width: fit-content;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--card);
    color: #16213E;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .search-export-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 280px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .search-box input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,82,118,0.1); }

  .export-btn {
    background: #1E8449;
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 11px 20px;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }

  .export-btn:hover { background: #176B3A; }

  .section-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title .badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--red);
    color: #fff;
  }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

  .chart-panel {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 20px;
  }

  .chart-panel h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 16px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    cursor: pointer;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

  .full-table {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header h3 { font-size: 15px; font-weight: 700; color: #16213E; }

  .table-wrapper { width: 100%; overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: right; }
  th { background: #f1f5f9; padding: 14px 18px; font-weight: 700; color: #475569; border-bottom: 1px solid var(--border); }
  td { padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .status-pill.expired { background: var(--red-light); color: var(--red); }
  .status-pill.critical { background: var(--orange-light); color: var(--orange); }
  .status-pill.soon { background: var(--yellow-light); color: var(--yellow); }
  .status-pill.ok { background: var(--green-light); color: var(--green); }

  .branch-tag { background: var(--gray-light); color: var(--gray); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; }

  .branch-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
  
  .branch-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-align: center;
  }

  .branch-card .b-name { font-size: 15px; font-weight: 900; color: #16213E; margin-bottom: 12px; }
  .branch-card .b-counts { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
  
  .b-count { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 700; }
  .b-count.red { background: var(--red-light); color: var(--red); }
  .b-count.orange { background: var(--orange-light); color: var(--orange); }
  .b-count.green { background: var(--green-light); color: var(--green); }

  .loading-state { text-align: center; padding: 80px 20px; color: var(--muted); grid-column: 1/-1; }
  .loading-state .spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; font-weight: bold; background: #fff; border-radius: var(--radius); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="logo-circle">🍖</div>
      <div class="brand-text">
        <h1>كبابجي</h1>
        <p>لوحة تنبيهات الوثائق والإقامات الحية</p>
      </div>
    </div>
    <div class="header-right">
      <div class="date-badge" id="currentDate">—</div>
      <div class="manager-badge">👤 أبو شفاء</div>
      <button class="sync-btn" id="syncBtn" onclick="loadData()">
        <span id="syncIcon">🔄</span> تحديث حيوات البيانات
      </button>
    </div>
  </div>
</div>

<div class="main">

  <div class="error-banner" id="errorBanner"></div>

  <div class="kpi-grid" id="kpiGrid">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>جاري استدعاء وتحليل بيانات لوحة كبابجي من السكريبت...</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('alerts')">🔔 التنبيهات العاجلة</button>
    <button class="tab-btn" onclick="switchTab('weekly')">📅 تنتهي هذا الأسبوع</button>
    <button class="tab-btn" onclick="switchTab('monthly')">📆 تنتهي هذا الشهر</button>
    <button class="tab-btn" onclick="switchTab('all')">📋 جميع الوثائق والبحث</button>
    <button class="tab-btn" onclick="switchTab('branches')">🏪 هيكلة الفروع</button>
  </div>

  <div id="tabContent"></div>

</div>

<script>
// =========================================
// ربط السكريبت المباشر (رابط الـ Web App الخاص بك)
// =========================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxL-cOnEwoRf1kPJOPmWmJzZGUIMZAwi3zsqBljmsNss3J1tYw-NTDCaczQTzaq6FtQmQ/exec';

let allData = [];
let activeTab = 'alerts';
let currentSubFilter = 'all';
let searchQuery = '';

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

// ضبط التاريخ العلوي بالموقع
document.getElementById('currentDate').textContent = TODAY.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

function loadData() {
  const syncBtn = document.getElementById('syncBtn');
  syncBtn.removeAttribute('onclick');
  document.getElementById('syncIcon').innerHTML = '<span class="spin">⏳</span>';

  fetch(API_URL)
    .then(r => {
      if(!r.ok) throw new Error("استجابة السكريبت غير صحيحة أو الخدمة غير متوفرة حالياً.");
      return r.json();
    })
    .then(data => {
      allData = data.filter(r => r.name && r.expiry);
      hideError();
      renderAll();
      document.getElementById('syncIcon').textContent = '🔄';
      syncBtn.setAttribute('onclick', 'loadData()');
    })
    .catch(err => {
      showError('فشل سحب البيانات الحية. تأكد من إعداد النشر بشكل صحيح ومطابقة التبويبات بالـ Sheets. ' + err.message);
      document.getElementById('syncIcon').textContent = '🔄';
      syncBtn.setAttribute('onclick', 'loadData()');
      document.getElementById('kpiGrid').innerHTML = '<div class="empty-state">⚠️ لا توجد بيانات متاحة للعرض، يرجى التحقق من الاتصال بالسكريبت.</div>';
    });
}

function getStatus(days) {
  if (days < 0) return 'expired';
  if (days <= 14) return 'critical';
  if (days <= 30) return 'soon';
  return 'ok';
}

function statusLabel(days) {
  if (days < 0) return `منتهية منذ ${Math.abs(days)} يوم 🔴`;
  if (days === 0) return 'تنتهي اليوم بشكل عاجل 🚨';
  if (days <= 14) return `متبقي ${days} يوم 🟠`;
  return `متبقي ${days} يوم`;
}

function docTypeLabel(type) {
  const map = { 'اقامات': '🪪 إقامة', 'التامين الطبي': '🏥 تأمين طبي', 'عقود العمل': '📄 عقد عمل', 'السجلات والرخص': '📜 رخصة / سجل' };
  return map[type] || type;
}

function renderAll() {
  renderKPIs();
  renderTab(activeTab);
}

function renderKPIs() {
  const expired = allData.filter(r => r.days < 0).length;
  const critical = allData.filter(r => r.days >= 0 && r.days <= 14).length;
  const soon = allData.filter(r => r.days > 14 && r.days <= 30).length;
  const ok = allData.filter(r => r.days > 30).length;
  const thisWeek = allData.filter(r => r.days >= 0 && r.days <= 7).length;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card danger">
      <span class="kpi-icon">🔴</span>
      <div class="kpi-value">${expired}</div>
      <div class="kpi-label">وثائق منتهية</div>
      <div class="kpi-sub">تتطلب تفعيل فوري</div>
    </div>
    <div class="kpi-card warning">
      <span class="kpi-icon">🟠</span>
      <div class="kpi-value">${critical}</div>
      <div class="kpi-label">تنتهي خلال 14 يوم</div>
      <div class="kpi-sub">عاجل وحرج جداً</div>
    </div>
    <div class="kpi-card caution">
      <span class="kpi-icon">🟡</span>
      <div class="kpi-value">${soon}</div>
      <div class="kpi-label">تنتهي خلال شهر</div>
      <div class="kpi-sub">تحديث قبل الغرامات</div>
    </div>
    <div class="kpi-card good">
      <span class="kpi-icon">🟢</span>
      <div class="kpi-value">${ok}</div>
      <div class="kpi-label">سارية المفعول</div>
      <div class="kpi-sub">في السليم حالياً</div>
    </div>
    <div class="kpi-card info">
      <span class="kpi-icon">📅</span>
      <div class="kpi-value">${thisWeek}</div>
      <div class="kpi-label">تنتهي هذا الأسبوع</div>
      <div class="kpi-sub">السبعة أيام القادمة</div>
    </div>
    <div class="kpi-card total">
      <span class="kpi-icon">📋</span>
      <div class="kpi-value">${allData.length}</div>
      <div class="kpi-label">إجمالي التوثيقات</div>
      <div class="kpi-sub">داخل قاعدة البيانات</div>
    </div>
  `;
}

function switchTab(tab) {
  activeTab = tab;
  currentSubFilter = 'all';
  searchQuery = '';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['alerts','weekly','monthly','all','branches'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  const el = document.getElementById('tabContent');
  if (!allData.length) { el.innerHTML = '<div class="empty-state">لا توجد سجلات محملة في اللوحة حالياً.</div>'; return; }

  if (tab === 'alerts') renderAlertsTab(el);
  else if (tab === 'weekly') renderPeriodTab(el, -999, 7, 'الوثائق المنتهية والتي تنتهي هذا الأسبوع');
  else if (tab === 'monthly') renderPeriodTab(el, -999, 30, 'الوثائق المنتهية والتي تنتهي خلال 30 يوماً القادمة');
  else if (tab === 'all') renderAllDocsTab(el);
  else if (tab === 'branches') renderBranchesTab(el);
}

function renderAlertsTab(el) {
  const urgent = allData.filter(r => r.days < 30).sort((a,b) => a.days - b.days);
  
  let html = `<div class="section-title">⚡ التنبيهات والإنذارات العاجلة <span class="badge">${urgent.length}</span></div>`;
  
  const expired = allData.filter(r => r.days < 0).length;
  const crit = allData.filter(r => r.days >= 0 && r.days <= 14).length;
  const soon = allData.filter(r => r.days > 14 && r.days <= 30).length;
  const ok = allData.filter(r => r.days > 30).length;

  html += `
    <div class="content-grid">
      <div class="chart-panel">
        <h3>📊 الموقف العام للوثائق والموظفين</h3>
        <div style="position:relative;height:210px"><canvas id="statusChart"></canvas></div>
      </div>
      <div class="chart-panel">
        <h3>📂 توزيع الوثائق الإجمالي حسب النوع</h3>
        <div style="position:relative;height:210px"><canvas id="typeChart"></canvas></div>
      </div>
    </div>
  `;

  const types = ['اقامات', 'التامين الطبي', 'عقود العمل', 'السجلات والرخص'];
  let tablesHtml = '';

  for (const type of types) {
    const items = urgent.filter(r => r.type === type);
    if (!items.length) continue;
    
    tablesHtml += `
      <div class="full-table">
        <div class="panel-header"><h3>${docTypeLabel(type)} (تنبيه حرج)</h3></div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>#</th><th>الاسم / البيان</th><th>الفرع</th><th>تاريخ الانتهاء</th><th>المهلة المتبقية</th></tr></thead>
            <tbody>
              ${items.map((r, i) => `
                <tr>
                  <td style="color:var(--muted);font-weight:600">${i+1}</td>
                  <td><strong>${r.name}</strong></td>
                  <td><span class="branch-tag">${r.branch}</span></td>
                  <td><code>${r.expiry}</code></td>
                  <td><span class="status-pill ${getStatus(r.days)}">${statusLabel(r.days)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  el.innerHTML = html + (tablesHtml || '<div class="empty-state">🎉 جميع الأوراق والوثائق مسجلة وصالحة ولا توجد أي إشعارات سلبية أقل من شهر!</div>');
  buildCharts(expired, crit, soon, ok);
}

function renderPeriodTab(el, minDays, maxDays, title) {
  const items = allData.filter(r => r.days >= minDays && r.days <= maxDays).sort((a,b) => a.days - b.days);
  
  el.innerHTML = `
    <div class="section-title">📅 ${title} <span class="badge" style="background:var(--blue)">${items.length} سجل</span></div>
    ${items.length === 0 ? '<div class="empty-state">🎉 السجلات في هذه الفترة خالية تماماً من الانتهاءات القريبة.</div>' : `
      <div class="full-table">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>#</th><th>الاسم والبيان</th><th>الفرع</th><th>النوع</th><th>تاريخ الانتهاء</th><th>الحالة والعد التنازلي</th></tr></thead>
            <tbody>
              ${items.map((r,i) => `
                <tr>
                  <td style="color:var(--muted);font-weight:600">${i+1}</td>
                  <td><strong>${r.name}</strong></td>
                  <td><span class="branch-tag">${r.branch}</span></td>
                  <td>${docTypeLabel(r.type)}</td>
                  <td><code>${r.expiry}</code></td>
                  <td><span class="status-pill ${getStatus(r.days)}">${statusLabel(r.days)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `}
  `;
}

function renderAllDocsTab(el) {
  const filters = [
    { key: 'all', label: '🗂️ عرض الكل' },
    { key: 'اقامات', label: '🪪 الإقامات' },
    { key: 'التامين الطبي', label: '🏥 التأمين الطبي' },
    { key: 'عقود العمل', label: '📄 عقود العمل' },
    { key: 'السجلات والرخص', label: '📜 الرخص والسجلات' }
  ];

  el.innerHTML = `
    <div class="section-title">📋 الأرشيف الكامل والبحث الذكي</div>
    <div class="filter-bar">
      ${filters.map(f => `<button class="filter-btn ${f.key === currentSubFilter ? 'active' : ''}" onclick="applySubFilter('${f.key}', this)">${f.label}</button>`).join('')}
    </div>
    
    <div class="search-export-container">
      <div class="search-box">
        <input type="text" id="tableSearch" value="${searchQuery}" placeholder="🔍 اكتب اسم الموظف أو الفرع أو البيان للبحث الفوري المباشر..." oninput="triggerSearch(this.value)">
      </div>
      <button class="export-btn" onclick="exportTableToCSV()">📥 تصدير الجدول الحالي لـ Excel</button>
    </div>

    <div class="full-table">
      <div class="table-wrapper">
        <table>
          <thead><tr><th>#</th><th>الاسم والبيان</th><th>الفرع</th><th>النوع</th><th>تاريخ الانتهاء</th><th>العد التنازلي والوضعية</th></tr></thead>
          <tbody id="allDocsTableBody"></tbody>
        </table>
      </div>
    </div>
  `;
  filterAndDrawTable();
}

function applySubFilter(key, btn) {
  currentSubFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAndDrawTable();
}

function triggerSearch(val) {
  searchQuery = val.trim().toLowerCase();
  filterAndDrawTable();
}

function filterAndDrawTable() {
  const tbody = document.getElementById('allDocsTableBody');
  if(!tbody) return;

  let filtered = currentSubFilter === 'all' ? allData : allData.filter(r => r.type === currentSubFilter);
  
  if(searchQuery) {
    filtered = filtered.filter(r => 
      r.name.toLowerCase().includes(searchQuery) || 
      r.branch.toLowerCase().includes(searchQuery)
    );
  }

  filtered.sort((a,b) => a.days - b.days);

  if(filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px; color:var(--muted)">🔍 لا توجد بيانات تطابق تصفية البحث الحالية.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((r, i) => `
    <tr>
      <td style="color:var(--muted);font-weight:600">${i+1}</td>
      <td><strong>${r.name}</strong></td>
      <td><span class="branch-tag">${r.branch}</span></td>
      <td>${docTypeLabel(r.type)}</td>
      <td><code>${r.expiry}</code></td>
      <td><span class="status-pill ${getStatus(r.days)}">${statusLabel(r.days)}</span></td>
    </tr>
  `).join('');
}

function renderBranchesTab(el) {
  const branches = [...new Set(allData.map(r => r.branch))].sort();
  
  let html = '<div class="section-title">🏪 تحليل وتوزيع السجلات على الفروع</div>';
  
  // بطاقات الفروع العلوية
  html += '<div class="branch-overview">';
  branches.forEach(b => {
    const bItems = allData.filter(r => r.branch === b);
    const exp = bItems.filter(r => r.days < 0).length;
    const crit = bItems.filter(r => r.days >= 0 && r.days <= 14).length;
    const ok = bItems.filter(r => r.days > 14).length;

    html += `
      <div class="branch-card">
        <div class="b-name">${b}</div>
        <div class="b-counts">
          ${exp > 0 ? `<span class="b-count red">منتهية: ${exp}</span>` : ''}
          ${crit > 0 ? `<span class="b-count orange">عاجلة: ${crit}</span>` : ''}
          <span class="b-count green">سارية: ${ok}</span>
        </div>
      </div>
    `;
  });
  html += '</div>';

  // جداول الفروع المنفصلة
  branches.forEach(b => {
    const bItems = allData.filter(r => r.branch === b).sort((a,b) => a.days - b.days);
    const dangerCount = bItems.filter(r => r.days < 30).length;

    html += `
      <div class="full-table">
        <div class="panel-header">
          <h3>🏪 فرع / إدارة: ${b}</h3>
          <span style="font-size:12px; font-weight:bold;">
            إجمالي ملفات الفرع: ${bItems.length} وثيقة ${dangerCount > 0 ? ` — (<span style="color:var(--red)">${dangerCount} تحت المراجعة العاجلة</span>)` : ''}
          </span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>الاسم / الموظف</th><th>النوع</th><th>تاريخ الانتهاء</th><th>المهلة والوضعية</th></tr></thead>
            <tbody>
              ${bItems.map(r => `
                <tr>
                  <td><strong>${r.name}</strong></td>
                  <td>${docTypeLabel(r.type)}</td>
                  <td><code>${r.expiry}</code></td>
                  <td><span class="status-pill ${getStatus(r.days)}">${statusLabel(r.days)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
}

function buildCharts(expired, crit, soon, ok) {
  setTimeout(() => {
    const canvas1 = document.getElementById('statusChart');
    const canvas2 = document.getElementById('typeChart');
    if (!canvas1 || !canvas2) return;

    // الرسم الدائري الأول
    new Chart(canvas1, {
      type: 'doughnut',
      data: {
        labels: ['منتهية', 'عاجلة (<=14 يوم)', 'قريبة (<=30 يوم)', 'سارية المفعول'],
        datasets: [{ data: [expired, crit, soon, ok], backgroundColor: ['#C0392B','#D35400','#D4AC0D','#1E8449'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { family: 'Tajawal', size: 12 } } } } }
    });

    // الرسم البياني الثاني لفرز المجموعات
    const subTypes = ['اقامات', 'التامين الطبي', 'عقود العمل', 'السجلات والرخص'];
    const counts = subTypes.map(t => allData.filter(r => r.type === t).length);

    new Chart(canvas2, {
      type: 'bar',
      data: {
        labels: ['إقامات', 'تأمين طبي', 'عقود العمل', 'رخص وسجلات'],
        datasets: [{ data: counts, backgroundColor: ['#1A5276','#1E8449','#D35400','#5D6D7E'], borderRadius: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false } }, y: { ticks: { font: { family: 'Tajawal', size: 12 } } } }
      }
    });
  }, 80);
}

function exportTableToCSV() {
  let filtered = currentSubFilter === 'all' ? allData : allData.filter(r => r.type === currentSubFilter);
  if(searchQuery) {
    filtered = filtered.filter(r => r.name.toLowerCase().includes(searchQuery) || r.branch.toLowerCase().includes(searchQuery));
  }
  
  if(filtered.length === 0) { alert('لا توجد بيانات متاحة للتصدير حالياً.'); return; }

  let csvContent = "\uFEFF"; // لدعم اللغة العربية في الـ Excel بدون رموز غريبة
  csvContent += "م,الاسم_البيان,الفرع,النوع,تاريخ_الانتهاء,الأيام_المتبقية\n";

  filtered.forEach((r, i) => {
    csvContent += `${i+1},"${r.name}","${r.branch}","${docTypeLabel(r.type)}","${r.expiry}",${r.days}\n`;
  });

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.setAttribute("href", url);
  link.setAttribute("download", `تقرير_وثائق_كبابجي_${new Date().toISOString().slice(0,10)}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  const el = document.getElementById('errorBanner');
  if(el) el.style.display = 'none';
}

// التشغيل الذكي التلقائي الفوري عند بدء الإقلاع للموقع
window.addEventListener('DOMContentLoaded', loadData);
</script>
